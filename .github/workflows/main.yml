name: Full Analytics Pipeline

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
  KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
  KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
  KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
  KAFKA_TOPIC: ${{ secrets.KAFKA_TOPIC }}
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
  MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
  HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
  KAFKA_CA_CERT: ${{ secrets.KAFKA_CA_CERT }}
  DBT_HOST: ${{ secrets.DBT_HOST }}
  DBT_PORT: ${{ secrets.DBT_PORT }}
  DBT_USER: ${{ secrets.DBT_USER }}
  DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
  DBT_DBNAME: ${{ secrets.DBT_DBNAME }}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r global_requirements.txt

      - name: Generate and ingest events (batch — bypasses Kafka)
        run: python scripts/run_generator.py

      - name: Run dbt transformations
        run: |
          cd dbt
          dbt deps || true
          dbt run --profiles-dir .
          dbt test --profiles-dir . || true

      - name: Train ML models
        run: |
          cd ml_models
          python train_all.py

      - name: Commit narrative to GitHub
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add dashboard/narrative.txt dashboard/causal_report.md || true
          git commit -m "Update narrative [skip ci]" || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main

      - name: Push dashboard to HuggingFace Space
        run: |
          # Build a clean folder with only what HF needs
          mkdir -p hf_deploy
          cp dashboard/app.py hf_deploy/app.py
          cp dashboard/hf_requirements.txt hf_deploy/requirements.txt
          cp dashboard/README.md hf_deploy/README.md
          cp dashboard/narrative.txt hf_deploy/narrative.txt 2>/dev/null || echo "No narrative yet"
          cp dashboard/causal_report.md hf_deploy/causal_report.md 2>/dev/null || echo "No causal report yet"

          cd hf_deploy
          git init
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "Deploy dashboard $(date +'%Y-%m-%d')"
          git push --force https://icebluesun:${{ secrets.HF_API_TOKEN }}@huggingface.co/spaces/icebluesun/telemetry-forge main
