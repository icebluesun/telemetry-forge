name: Data Pipeline (Hourly)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
  KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
  KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
  KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
  KAFKA_TOPIC: ${{ secrets.KAFKA_TOPIC }}
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
  MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
  HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
  KAFKA_CA_CERT: ${{ secrets.KAFKA_CA_CERT }}
  DBT_HOST: ${{ secrets.DBT_HOST }}
  DBT_PORT: ${{ secrets.DBT_PORT }}
  DBT_USER: ${{ secrets.DBT_USER }}
  DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
  DBT_DBNAME: ${{ secrets.DBT_DBNAME }}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r global_requirements.txt

      - name: Generate and ingest events (batch — bypasses Kafka)
        run: python scripts/run_generator.py

      - name: Run dbt transformations
        run: |
          cd dbt
          dbt deps || true
          dbt run --profiles-dir .
          dbt test --profiles-dir . || true

