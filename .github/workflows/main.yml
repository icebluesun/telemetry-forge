name: Full Analytics Pipeline

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
  KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
  KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
  KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
  KAFKA_TOPIC: ${{ secrets.KAFKA_TOPIC }}
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
  MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
  HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
  KAFKA_CA_CERT: ${{ secrets.KAFKA_CA_CERT }}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r global_requirements.txt
          pip install dbt-postgres
          pip install great_expectations

      - name: Generate and stream events
        run: |
          cd data_generation
          python producer.py

      - name: Ingest to PostgreSQL
        run: |
          cd ingestion
          python consumer.py

      - name: Run dbt transformations
        run: |
          cd dbt
          dbt deps || true
          dbt run --profiles-dir .
          dbt test --profiles-dir . || true

      - name: Train ML models
        run: |
          cd ml_models
          python train_all.py

      - name: Commit narrative to dashboard
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add dashboard/narrative.txt || true
          git commit -m "Update narrative [skip ci]" || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
